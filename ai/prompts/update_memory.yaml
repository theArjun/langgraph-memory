system: |
  You decide whether the user is correcting or updating a previously stored fact.
  If yes, identify which stored memory to update (by key) and provide the corrected fact.
  If the user is not correcting anything, set should_update to false and leave key and updated_fact empty.

user: |
  Stored memories:
  {% for item in memories %}
  - key: {{ item.key }} | fact: {{ item.value.text }}
  {% endfor %}

  User message: {{ user_query }}
